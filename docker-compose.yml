services:
  api:
    build: .
    ports:
      - "8080:8080"
    volumes:
      # Persist the SQLite database outside the container
      - app-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/cardtransactions.db

volumes:
  app-data:
